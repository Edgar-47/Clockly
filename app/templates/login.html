<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Clockly</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-card__brand">
      <svg class="login-card__logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      <span>Clockly</span>
    </div>

    <h2 class="login-card__heading">Acceso al panel</h2>
    <p class="login-card__sub">Introduce tus credenciales para continuar.</p>

    {% if error %}
    <div class="alert alert--error" role="alert">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="form" novalidate>
      <div class="form__group">
        <label class="form__label" for="identifier">DNI / Usuario</label>
        <input
          class="form__input"
          type="text"
          id="identifier"
          name="identifier"
          value="{{ identifier or '' }}"
          placeholder="Tu DNI o nombre de usuario"
          required
          autofocus
        >
      </div>

      <div class="form__group">
        <label class="form__label" for="password">Contraseña</label>
        <input
          class="form__input"
          type="password"
          id="password"
          name="password"
          placeholder="Tu contraseña"
          required
        >
      </div>

      <button type="submit" class="btn btn--primary btn--full">
        Entrar
      </button>
    </form>
  </div>

</body>
</html>
