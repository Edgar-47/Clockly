{% extends "base.html" %}

{% block title %}Nuevo empleado{% endblock %}

{% block page_title %}Nuevo empleado{% endblock %}

{% block content %}

<div class="card card--narrow">
  <div class="card__header">
    <h2 class="card__title">Datos del empleado</h2>
  </div>

  {% if error %}
  <div class="alert alert--error" role="alert">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/employees/new" class="form" novalidate>
    <div class="form__row">
      <div class="form__group">
        <label class="form__label" for="first_name">Nombre <span class="form__required">*</span></label>
        <input class="form__input" type="text" id="first_name" name="first_name"
               value="{{ form.first_name or '' }}" placeholder="Nombre" required autofocus>
      </div>
      <div class="form__group">
        <label class="form__label" for="last_name">Apellidos <span class="form__required">*</span></label>
        <input class="form__input" type="text" id="last_name" name="last_name"
               value="{{ form.last_name or '' }}" placeholder="Apellidos" required>
      </div>
    </div>

    <div class="form__group">
      <label class="form__label" for="dni">DNI <span class="form__required">*</span></label>
      <input class="form__input" type="text" id="dni" name="dni"
             value="{{ form.dni or '' }}" placeholder="Ej: 12345678A" required>
      <p class="form__hint">Identificador único. Se convierte a mayúsculas automáticamente.</p>
    </div>

    <div class="form__group">
      <label class="form__label" for="password">Contraseña <span class="form__required">*</span></label>
      <input class="form__input" type="password" id="password" name="password"
             placeholder="Mínimo 6 caracteres" required minlength="6">
    </div>

    <div class="form__group">
      <label class="form__label" for="role">Rol</label>
      <select class="form__select" id="role" name="role">
        <option value="employee" {{ 'selected' if (form.role or 'employee') == 'employee' }}>Empleado</option>
        <option value="admin" {{ 'selected' if form.role == 'admin' }}>Administrador</option>
      </select>
    </div>

    <div class="form__actions">
      <a href="/employees" class="btn btn--ghost">Cancelar</a>
      <button type="submit" class="btn btn--primary">Crear empleado</button>
    </div>
  </form>
</div>

{% endblock %}
