<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Kiosk - Clockly</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            font-family: var(--font-sans);
        }

        .kiosk-card {
            background: var(--color-surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: var(--space-10);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .kiosk-logo {
            font-size: 48px;
            margin-bottom: var(--space-4);
        }

        .kiosk-title {
            font-size: var(--text-2xl);
            font-weight: 700;
            color: var(--color-text);
            margin: 0 0 var(--space-2) 0;
        }

        .kiosk-subtitle {
            font-size: var(--text-sm);
            color: var(--color-text-muted);
            margin-bottom: var(--space-6);
        }

        .error-box {
            background: var(--color-danger-bg);
            border: 1px solid var(--color-danger-border);
            color: var(--color-danger);
            padding: var(--space-4);
            border-radius: var(--radius);
            margin-bottom: var(--space-4);
            font-size: var(--text-sm);
        }

        .form-group {
            margin-bottom: var(--space-4);
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: var(--space-2);
        }

        .form-input {
            width: 100%;
            padding: var(--space-3) var(--space-4);
            font-size: var(--text-base);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            font-family: var(--font-sans);
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-light);
        }

        .button-large {
            width: 100%;
            padding: var(--space-4) var(--space-6);
            font-size: var(--text-base);
            font-weight: 600;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .button-primary {
            background: var(--color-primary);
            color: white;
        }

        .button-primary:hover {
            background: var(--color-primary-dark);
        }

        .button-primary:active {
            transform: scale(0.98);
        }

        .help-text {
            font-size: var(--text-xs);
            color: var(--color-text-muted);
            margin-top: var(--space-6);
        }
    </style>
</head>
<body>
    <div class="kiosk-card">
        <div class="kiosk-logo">⏱️</div>
        <h1 class="kiosk-title">Bienvenido</h1>
        <p class="kiosk-subtitle">Sistema de Fichaje por Kiosk</p>

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}

        <form method="post">
            <div class="form-group">
                <label class="form-label" for="login_code">Código de Negocio</label>
                <input
                    type="text"
                    id="login_code"
                    name="login_code"
                    class="form-input"
                    placeholder="Ej: ABC123"
                    autocomplete="off"
                    required
                    autofocus
                >
            </div>

            <button type="submit" class="button-large button-primary">
                Acceder
            </button>
        </form>

        <p class="help-text">
            Solicita el código de acceso a tu administrador si no lo tienes.
        </p>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
