{% extends "kiosk/base.html" %}

{% block title %}Iniciar Sesión - Kiosk{% endblock %}

{% block header_title %}Iniciar Sesión - Empleado{% endblock %}

{% block content %}
<style>
    .kiosk-login {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: var(--space-6);
    }

    .login-form {
        width: 100%;
        max-width: 400px;
        background: var(--color-surface);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        box-shadow: var(--shadow-md);
    }

    .form-group {
        margin-bottom: var(--space-4);
    }

    .form-label {
        display: block;
        font-size: var(--text-sm);
        font-weight: 600;
        color: var(--color-text);
        margin-bottom: var(--space-2);
    }

    .form-input {
        width: 100%;
        padding: var(--space-3) var(--space-4);
        font-size: var(--text-base);
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        box-sizing: border-box;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
        outline: none;
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px var(--color-primary-light);
    }

    .button-submit {
        width: 100%;
        padding: var(--space-4);
        font-size: var(--text-base);
        font-weight: 600;
        border: none;
        border-radius: var(--radius);
        background: var(--color-primary);
        color: white;
        cursor: pointer;
        transition: all 0.2s;
    }

    .button-submit:hover {
        background: var(--color-primary-dark);
    }

    .button-submit:active {
        transform: scale(0.98);
    }

    .error-alert {
        width: 100%;
        max-width: 400px;
        background: var(--color-danger-bg);
        border: 1px solid var(--color-danger-border);
        color: var(--color-danger);
        padding: var(--space-4);
        border-radius: var(--radius);
        font-size: var(--text-sm);
    }

    .back-button {
        padding: var(--space-3) var(--space-4);
        font-size: var(--text-sm);
        border: 1px solid var(--color-border);
        background: var(--color-surface);
        color: var(--color-text);
        border-radius: var(--radius);
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
    }

    .back-button:hover {
        border-color: var(--color-primary);
        color: var(--color-primary);
    }
</style>

<div class="kiosk-login">
    {% if error %}
    <div class="error-alert">
        {{ error }}
    </div>
    {% endif %}

    <form class="login-form" method="post">
        <div class="form-group">
            <label class="form-label" for="identifier">DNI o Usuario</label>
            <input
                type="text"
                id="identifier"
                name="identifier"
                class="form-input"
                placeholder="Ingrese su DNI"
                autocomplete="off"
                value="{{ identifier or '' }}"
                required
                autofocus
            >
        </div>

        <div class="form-group">
            <label class="form-label" for="password">Contraseña</label>
            <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="Ingrese su contraseña"
                required
            >
        </div>

        <button type="submit" class="button-submit">
            Iniciar Sesión
        </button>
    </form>

    <a href="/kiosk" class="back-button">
        ← Volver al Kiosk
    </a>
</div>

{% endblock %}
